<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Trainium Deep‑Dive Series</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 1.5rem;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: white;
      color: #333;
      line-height: 1.6;
    }
    @media (min-width: 768px) {
      body {
        padding: 3rem;
      }
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      margin: 0 0 1.25rem 0;
    }
    @media (min-width: 768px) {
      h1 {
        font-size: 2rem;
      }
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      margin-bottom: 1rem;
    }

    a {
      display: block;
      padding: 0.8rem 1rem;
      border-radius: 6px;
      background-color: #f5f7fa;
      color: #0066cc;
      text-decoration: none;
      border: 1px solid #e2e8f0;
      transition: background-color 0.2s, border-color 0.2s;
    }

    a:hover {
      background-color: #edf2f7;
      border-color: #a0aec0;
    }

    @media (min-width: 768px) {
      li {
        margin-bottom: 1.2rem;
      }
      a {
        padding: 1rem 1.5rem;
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Trainium Deep‑Dive Series</h1>
    <p>Choose a module to continue:</p>
    <ul>
      <li>
        <a href="https://gyaneshhere.github.io/trainium1-deep-dive.html">
          Trainium 1 – Deep Dive
        </a>
      </li>
      <li>
        <a href="https://gyaneshhere.github.io/trainium2-deep-dive.html">
          Trainium 2 – Deep Dive
        </a>
      </li>
      <li>
        <a href="https://gyaneshhere.github.io/trainium3-deep-dive.html">
          Trainium 3 – Deep Dive
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
